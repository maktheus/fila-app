name: Publish Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:
    inputs:
      api_base:
        description: 'Backend HTTPS URL. Example: https://api.example.com'
        required: false
        type: string
      ws_base:
        description: 'Backend WebSocket URL. Example: wss://api.example.com/ws'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare runtime config
        shell: bash
        run: |
          cat > frontend/config.js <<'EOF'
          window.FILA_API_BASE = '${{ inputs.api_base || vars.FILA_API_BASE }}';
          window.FILA_WS_BASE = '${{ inputs.ws_base || vars.FILA_WS_BASE }}';
          window.FILA_ADMIN_TOKEN = '';
          window.FILA_ADS_ENABLED = ${{ vars.FILA_ADS_ENABLED || 'true' }};
          window.FILA_PLATFORM = 'web';
          window.FILA_WEB_ADS_PROVIDER = 'gam';
          window.FILA_GAM_NETWORK_CODE = '${{ vars.FILA_GAM_NETWORK_CODE }}';
          window.FILA_GAM_AD_UNIT_PREFIX = '${{ vars.FILA_GAM_AD_UNIT_PREFIX || 'fila_virtual' }}';
          window.FILA_GAM_SLOTS = {
            'landing-midpage': { sizes: [[320, 100], [300, 250], [728, 90]] },
            'queue-side': { sizes: [[300, 250], [320, 100]] },
            'queue-join-bottom': { sizes: [[320, 100], [300, 250]] },
            'queue-status-bottom': { sizes: [[320, 100], [300, 250]] },
          };
          window.FILA_MOBILE_ADS_PROVIDER = 'admob';
          window.FILA_ADMOB_ANDROID_APP_ID = '${{ vars.FILA_ADMOB_ANDROID_APP_ID }}';
          window.FILA_ADMOB_UNITS = {
            banner: '${{ vars.FILA_ADMOB_BANNER_UNIT_ID }}',
            interstitial: '${{ vars.FILA_ADMOB_INTERSTITIAL_UNIT_ID }}',
            appOpen: '${{ vars.FILA_ADMOB_APP_OPEN_UNIT_ID }}',
          };
          EOF
          touch frontend/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
