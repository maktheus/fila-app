services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - VENUE_NAME=Unidade Centro
      - OPERATOR_NAME=Equipe balcão
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
