<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fila Virtual</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#191919">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  });
}
</script>
<style>
  :root{color-scheme:dark;--ink:#191919;--surface:#1f1e1c;--line:#37342f;--cream:#f0efeb;--bone:#dbd4c9;--coral:#ee736e}
  *{box-sizing:border-box}
  html,body{min-height:100%;margin:0;background:var(--ink);color:var(--cream);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  body{display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 30% 0%,rgba(238,115,110,.18),transparent 30rem),var(--ink)}
  main{width:min(680px,100%);border:1px solid var(--line);background:rgba(31,30,28,.92);border-radius:18px;padding:28px}
  h1{font-size:clamp(38px,9vw,72px);line-height:.94;letter-spacing:-.04em;margin:0 0 12px}
  p{color:var(--bone);line-height:1.55;font-size:17px}
  .actions{display:grid;gap:12px;margin-top:24px}
  a{display:flex;align-items:center;justify-content:center;min-height:52px;border-radius:14px;text-decoration:none;font-weight:800}
  .primary{background:var(--coral);color:var(--ink)}
  .secondary{border:1px solid var(--line);color:var(--cream)}
  small{display:block;color:#8c857a;text-transform:uppercase;letter-spacing:.12em;font-weight:800;margin-bottom:14px}
  @media(min-width:620px){.actions{grid-template-columns:1fr 1fr}}
</style>
<script src="config.js"></script>
<script src="ads.js"></script>
</head>
<body>
<main>
  <small>Fila Virtual</small>
  <h1>Entre na fila pelo celular.</h1>
  <p>Use o app web mobile para entrar por QR code e acompanhar sua posicao ao vivo. Operadores acessam o painel separado.</p>
  <div class="actions">
    <a class="primary" href="cliente.html">Abrir app do cliente</a>
    <a class="secondary" href="landing.html">Ver pagina comercial</a>
  </div>
</main>
</body>
</html>
