<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visão Geral — Fila Virtual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}

  :root {
    --mutum-red:#ED2C27;
    --mutum-coral:#EE736E;
    --mutum-bone:#DBD4C9;
    --mutum-ink:#191919;
    --mutum-ink-2:#2A2826;
    --mutum-cream:#F0EFEB;
    --mutum-forest:#1F5D3A;
    --mutum-leaf:#3F8A5B;
    --mutum-amber:#E8A33D;

    --bg:var(--mutum-ink);
    --bg-2:#232220;
    --bg-3:#2A2826;
    --surface:#1F1E1C;
    --fg-1:var(--mutum-bone);
    --fg-2:#B5AFA4;
    --fg-3:#877F73;
    --border:#34322E;
    --border-strong:#4A4742;
    --primary:var(--mutum-coral);
    --on-primary:var(--mutum-ink);
    --shadow-lg:0 18px 40px rgba(0,0,0,0.5),0 4px 8px rgba(0,0,0,0.3);

    /* Chart palette — validated (dataviz six checks) against --surface in dark mode */
    --c1:#E86660;  /* entradas / slot 1 */
    --c2:#3D8CC2;  /* atendimentos / slot 2 */
    --c3:#C48119;  /* slot 3 */
    --c4:#3F8A5B;  /* slot 4 */
    --c5:#C26B3A;  /* slot 5 */

    --font-display:"Space Grotesk",ui-sans-serif,system-ui,sans-serif;
    --font-body:"Manrope",ui-sans-serif,system-ui,sans-serif;
    --font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,monospace;
    --ease-out:cubic-bezier(0.22,1,0.36,1);
  }

  html,body{min-height:100%;background:var(--bg);color:var(--fg-1);font-family:var(--font-body);-webkit-font-smoothing:antialiased}

  @keyframes pulseDot{0%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}

  button{font-family:var(--font-body);cursor:pointer}
  button:focus-visible{outline:2px solid color-mix(in oklch,var(--mutum-coral) 50%,transparent);outline-offset:2px;border-radius:6px}

  .shell{max-width:1320px;margin:0 auto;padding:22px 32px 44px}

  .header{display:flex;align-items:center;gap:18px;padding-bottom:22px;border-bottom:1px solid var(--border)}
  .header-brand{display:flex;align-items:center;gap:11px}
  .header-brand-sub{font-family:var(--font-display);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--fg-3)}
  .header-brand-title{font-family:var(--font-display);font-weight:600;font-size:17px;letter-spacing:-0.01em;color:var(--fg-1)}
  .live-badge{display:flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px}
  .live-badge.connected{background:color-mix(in oklch,var(--mutum-leaf) 18%,transparent);border:1px solid color-mix(in oklch,var(--mutum-leaf) 45%,transparent)}
  .live-badge.disconnected{background:color-mix(in oklch,var(--mutum-amber) 18%,transparent);border:1px solid color-mix(in oklch,var(--mutum-amber) 45%,transparent)}
  .live-dot{width:7px;height:7px;border-radius:999px}
  .live-badge.connected .live-dot{background:var(--mutum-leaf);animation:pulseDot 1.6s infinite}
  .live-badge.disconnected .live-dot{background:var(--mutum-amber)}
  .live-text{font-size:11px;font-weight:700;letter-spacing:0.06em}
  .live-badge.connected .live-text{color:var(--mutum-leaf)}
  .live-badge.disconnected .live-text{color:var(--mutum-amber)}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:16px}
  .link-nav{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--fg-2);text-decoration:none;padding:8px 12px;border-radius:9px;border:1px solid var(--border);transition:border-color 140ms,color 140ms}
  .link-nav:hover{border-color:var(--border-strong);color:var(--fg-1)}
  .clock{font-family:var(--font-mono);font-size:14px;color:var(--fg-2);min-width:74px;text-align:right}

  /* Filter row — one row, above everything it scopes */
  .filters{display:flex;align-items:center;gap:8px;margin-top:18px}
  .filters-label{font-size:12px;font-weight:700;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-right:4px}
  .range-btn{appearance:none;border:1px solid var(--border);background:transparent;color:var(--fg-2);border-radius:9px;padding:8px 15px;font-weight:700;font-size:13px;transition:all 140ms}
  .range-btn:hover{color:var(--fg-1);border-color:var(--border-strong)}
  .range-btn.active{background:var(--bg-3);color:var(--fg-1);border-color:var(--border-strong)}
  .updated-at{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}

  /* Health strip */
  .health{display:flex;flex-wrap:wrap;gap:0;margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .health-item{flex:1 1 0;min-width:130px;display:flex;align-items:center;gap:10px;padding:13px 18px}
  .health-item + .health-item{border-left:1px solid var(--border)}
  .health-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .health-icon.ok{background:color-mix(in oklch,var(--mutum-leaf) 18%,transparent);color:var(--mutum-leaf)}
  .health-icon.warn{background:color-mix(in oklch,var(--mutum-amber) 18%,transparent);color:var(--mutum-amber)}
  .health-icon.err{background:color-mix(in oklch,var(--mutum-red) 18%,transparent);color:var(--mutum-red)}
  .health-icon.neutral{background:var(--bg-3);color:var(--fg-2)}
  .health-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--fg-3)}
  .health-value{font-family:var(--font-mono);font-size:14px;font-weight:500;color:var(--fg-1);margin-top:1px}

  /* KPI tiles */
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:14px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
  .kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--fg-3)}
  .kpi-value{font-family:var(--font-body);font-weight:800;font-size:34px;line-height:1;letter-spacing:-0.02em;margin-top:8px;color:var(--fg-1)}
  .kpi-sub{font-size:12px;color:var(--fg-3);margin-top:5px}
  .kpi-spark{position:absolute;right:12px;bottom:12px;opacity:.9}

  /* Chart cards */
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;min-width:0}
  .card.loading{opacity:.65;transition:opacity 160ms}
  .card-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .card-title{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--fg-1)}
  .card-sub{font-size:12px;color:var(--fg-3)}
  .btn-table{margin-left:auto;appearance:none;border:1px solid var(--border);background:transparent;color:var(--fg-3);border-radius:8px;padding:5px 11px;font-weight:700;font-size:11px;transition:all 140ms}
  .btn-table:hover{color:var(--fg-1);border-color:var(--border-strong)}
  .btn-table.active{background:var(--bg-3);color:var(--fg-1)}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin:8px 0 2px}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--fg-2)}
  .legend-swatch{width:10px;height:10px;border-radius:3px}
  .legend-line{width:14px;height:2px;border-radius:2px}
  .chart-box{margin-top:6px}
  .chart-box svg{display:block;width:100%;height:auto}
  .chart-svg text{font-family:var(--font-mono);font-size:11px;fill:var(--fg-3)}
  .chart-svg .dlabel{font-family:var(--font-body);font-weight:700;font-size:11px;fill:var(--fg-2)}

  /* Table view twin */
  .tbl{width:100%;border-collapse:collapse;margin-top:10px}
  .tbl th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--fg-3);text-align:right;padding:7px 10px;border-bottom:1px solid var(--border)}
  .tbl th:first-child{text-align:left}
  .tbl td{font-family:var(--font-mono);font-size:13px;color:var(--fg-1);text-align:right;padding:7px 10px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
  .tbl td:first-child{text-align:left;font-family:var(--font-body);font-weight:600;color:var(--fg-2)}
  .tbl tr:last-child td{border-bottom:none}

  /* Donut center + layout */
  .donut-wrap{display:flex;align-items:center;gap:22px;margin-top:8px}
  .donut-legend{display:flex;flex-direction:column;gap:10px;min-width:0}
  .donut-row{display:flex;align-items:center;gap:9px;font-size:13px}
  .donut-row .name{font-weight:600;color:var(--fg-2)}
  .donut-row .val{margin-left:auto;font-family:var(--font-mono);color:var(--fg-1);font-variant-numeric:tabular-nums}
  .donut-row .pct{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);min-width:38px;text-align:right;font-variant-numeric:tabular-nums}

  /* Tooltip */
  .tip{position:fixed;z-index:60;pointer-events:none;background:var(--mutum-ink-2);border:1px solid var(--border-strong);border-radius:10px;padding:9px 12px;box-shadow:var(--shadow-lg);opacity:0;transition:opacity 90ms;max-width:240px}
  .tip.show{opacity:1}
  .tip-title{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-bottom:5px}
  .tip-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--fg-2);line-height:1.7}
  .tip-key{width:12px;height:2px;border-radius:2px;flex:0 0 auto}
  .tip-val{margin-left:auto;font-family:var(--font-mono);font-weight:500;color:var(--fg-1);padding-left:14px}

  .empty-note{padding:30px 10px;text-align:center;color:var(--fg-3);font-size:13px}

  @media(max-width:1024px){
    .kpis{grid-template-columns:repeat(3,1fr)}
    .grid{grid-template-columns:1fr}
    .health-item{min-width:45%}
    .health-item + .health-item{border-left:none;border-top:1px solid var(--border)}
  }
  @media(max-width:640px){
    .shell{padding:16px}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .header{flex-wrap:wrap;gap:12px}
    .header-right{width:100%;justify-content:flex-end}
    .filters{flex-wrap:wrap}
    .updated-at{width:100%;margin-left:0}
    .donut-wrap{flex-direction:column;align-items:stretch}
  }
</style>
</head>
<body>
<div class="shell" id="app"></div>
<div class="tip" id="tip"></div>

<script>
(function() {
  // ---- CONFIG (same convention as index.html) ----
  const API_BASE = window.FILA_API_BASE || '';
  const WS_BASE = window.FILA_WS_BASE || '';

  // ---- STATE ----
  let metrics = null;
  let connected = false;
  let range = 'today';
  let latencyMs = null;
  let loading = false;
  let ws = null;
  let reconnectDelay = 1000;
  let refetchTimer = null;
  const tableMode = { movement: false, wait: false, sources: false, counters: false };

  const COLORS = { c1: '#E86660', c2: '#3D8CC2', c3: '#C48119', c4: '#3F8A5B', c5: '#C26B3A' };
  const SOURCE_LABELS = { qr: 'QR code', senha: 'Senha balcão', passou: 'Passou a vez' };
  const RANGE_LABELS = { today: 'Hoje', '4h': 'Últimas 4h', '1h': 'Última hora' };

  // ---- HELPERS ----
  function pad(n) { return String(n).padStart(2, '0'); }
  function clockNow() { const d = new Date(); return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()); }
  function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
  function fmtUptime(sec) {
    if (sec < 3600) return Math.floor(sec / 60) + 'min';
    if (sec < 86400) return Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'min';
    return Math.floor(sec / 86400) + 'd ' + Math.floor((sec % 86400) / 3600) + 'h';
  }

  const BIRD_SVG = '<svg width="26" height="33" viewBox="0 0 384 483" fill="none"><path d="M161.518 248.013C200.113 248.013 231.4 279.25 231.4 317.783C231.4 356.317 200.113 387.554 161.518 387.554C161.067 387.554 160.616 387.549 160.167 387.54L160.175 387.554L45.8376 390.119C43.5125 390.171 42.0147 387.673 43.157 385.647L98.8816 286.81C110.31 263.817 134.066 248.013 161.518 248.013Z" fill="#EE736E"/><path fill-rule="evenodd" clip-rule="evenodd" d="M291.873 274.848C273.505 287.685 239.084 278.927 239.084 278.927C239.084 278.927 252.903 309.733 240.806 345.96C228.709 382.187 215.272 378.162 216.615 384.871C217.959 391.58 287.84 386.213 317.407 351.327C346.975 316.441 361.757 253.379 348.316 245.329C334.875 237.279 305.312 265.456 291.873 274.848Z" fill="#EE736E"/><path d="M262.31 170.191C265.576 170.191 268.764 170.524 271.843 171.157C262.44 173.982 255.59 182.692 255.59 193.001C255.59 205.598 265.819 215.811 278.437 215.811C291.054 215.81 301.282 205.598 301.282 193.001C301.282 192.219 301.242 191.446 301.165 190.685C306.325 198.221 309.346 207.334 309.346 217.152C309.346 243.088 288.287 264.113 262.31 264.113C236.333 264.113 215.274 243.088 215.274 217.152C215.274 191.217 236.333 170.191 262.31 170.191Z" fill="#EC2B26"/><path fill-rule="evenodd" clip-rule="evenodd" d="M35.1926 403.655H142.704C142.704 403.655 125.233 447.933 82.2287 470.742C39.2243 493.551 3.96593 478.792 0.251526 472.084C-3.46286 465.375 35.1926 403.655 35.1926 403.655Z" fill="#EC2B26"/><path d="M235.432 123.23C171.858 132.81 142.545 218.285 136.98 236.54C136.521 238.047 137.943 239.372 139.46 238.952C145.266 237.345 157.13 234.403 165.55 234.594C173.923 234.784 185.7 238.227 191.541 240.105C193.069 240.596 194.626 239.198 194.329 237.62C191.285 221.433 183.657 157.095 252.903 150.064C324.184 142.827 325.952 214.751 325.583 229.353C325.549 230.665 326.727 231.681 328.02 231.453C333.298 230.524 345.613 228.455 353.694 227.886C362.318 227.278 376.664 229.469 381.561 230.28C382.541 230.442 383.474 229.863 383.641 228.883C384.316 224.91 384.943 214.098 376.54 198.368C367.165 180.818 350.638 176.53 346.56 175.72C345.972 175.604 345.457 175.277 345.126 174.777C340.361 167.576 301.97 113.203 235.432 123.23Z" fill="#ED2C27"/><path d="M160.975 407.423L150.862 427.617C150.199 428.941 151.155 430.502 152.636 430.512L336.894 431.826C337.331 431.83 337.762 431.689 338.103 431.416C348.27 423.284 346.793 408.953 336.224 404.996C334.81 404.467 220.87 405.43 162.704 406.32C161.958 406.331 161.309 406.757 160.975 407.423Z" fill="#ED2C27"/><path d="M293.271 52.4925C317.149 72.7298 316.879 117.623 309.904 120.191C302.929 122.759 295.799 105.629 287.213 98.481C278.627 91.3328 251.07 75.4076 229.317 56.044C207.565 36.6804 218.26 10.6154 226.326 0.00337097C238.692 9.06758 269.394 32.2553 293.271 52.4925Z" fill="#ED2C27"/><path d="M205.537 54.803C236.347 60.3236 258.644 99.2882 253.9 105.01C249.156 110.732 234.391 99.4946 223.378 97.6208C212.364 95.7471 180.537 95.8026 152.004 89.9713C123.471 84.14 119.64 56.2278 121.291 43.0006C136.536 44.6345 174.728 49.2824 205.537 54.803Z" fill="#ED2C27"/><path d="M125.36 102.074C154.633 90.9935 193.773 112.983 192.639 120.329C191.506 127.675 173.066 125.612 162.653 129.658C152.239 133.705 124.955 150.093 97.4762 159.738C69.997 169.383 52.3793 147.397 47.0054 135.198C60.9266 128.773 96.0873 113.154 125.36 102.074Z" fill="#ED2C27"/><path d="M85.9338 187.43C104.189 162.005 148.959 158.67 152.079 165.417C155.199 172.163 138.696 180.646 132.26 189.777C125.824 198.909 112.162 227.655 94.6066 250.892C77.0513 274.128 50.2121 265.56 38.9869 258.371C47.0294 245.317 67.6782 212.854 85.9338 187.43Z" fill="#ED2C27"/></svg>';

  // ---- DATA ----
  async function fetchMetrics() {
    loading = true;
    markLoading(true);
    const t0 = performance.now();
    try {
      const res = await fetch(API_BASE + '/api/metrics?range=' + range);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      metrics = await res.json();
      latencyMs = Math.round(performance.now() - t0);
    } catch (e) {
      latencyMs = null;
      metrics = metrics || null; // keep last good frame
    }
    loading = false;
    render();
  }

  function scheduleRefetch() {
    // Debounce bursts of WS events into one refetch
    if (refetchTimer) return;
    refetchTimer = setTimeout(() => { refetchTimer = null; fetchMetrics(); }, 600);
  }

  function markLoading(on) {
    document.querySelectorAll('.card').forEach(c => c.classList.toggle('loading', on));
  }

  // ---- WEBSOCKET (live refresh) ----
  function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = WS_BASE || (proto + '//' + location.host);
    try { ws = new WebSocket(wsUrl + '/ws'); } catch (e) { connected = false; return; }
    ws.onopen = () => { connected = true; reconnectDelay = 1000; render(); };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event) scheduleRefetch(); // queue moved → refresh aggregates
      } catch {}
    };
    ws.onclose = () => {
      connected = false;
      render();
      setTimeout(connectWs, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 15000);
    };
    ws.onerror = () => ws.close();
  }

  // ---- TOOLTIP ----
  const tipEl = document.getElementById('tip');
  function showTip(x, y, html) {
    tipEl.innerHTML = html;
    tipEl.classList.add('show');
    const w = tipEl.offsetWidth, h = tipEl.offsetHeight;
    let left = x + 14, top = y - h - 10;
    if (left + w > window.innerWidth - 8) left = x - w - 14;
    if (top < 8) top = y + 16;
    tipEl.style.left = left + 'px';
    tipEl.style.top = top + 'px';
  }
  function hideTip() { tipEl.classList.remove('show'); }
  function tipHtml(title, rows) {
    return '<div class="tip-title">' + esc(title) + '</div>' + rows.map(r =>
      '<div class="tip-row"><span class="tip-key" style="background:' + r.color + '"></span>' +
      esc(r.label) + '<span class="tip-val">' + esc(r.value) + '</span></div>'
    ).join('');
  }

  // ---- SVG BUILDERS ----
  const M = { top: 14, right: 14, bottom: 26, left: 34 };

  function niceMax(v) {
    if (v <= 5) return 5;
    const mag = Math.pow(10, Math.floor(Math.log10(v)));
    for (const m of [1, 2, 2.5, 5, 10]) { if (v <= m * mag) return m * mag; }
    return 10 * mag;
  }

  function gridAndAxis(W, H, yMax, xLabels, everyN) {
    const plotW = W - M.left - M.right, plotH = H - M.top - M.bottom;
    let out = '';
    const steps = 4;
    for (let i = 0; i <= steps; i++) {
      const yv = yMax / steps * i;
      const y = M.top + plotH - (yv / yMax) * plotH;
      out += '<line x1="' + M.left + '" y1="' + y + '" x2="' + (W - M.right) + '" y2="' + y + '" stroke="var(--border)" stroke-width="1"/>';
      out += '<text x="' + (M.left - 7) + '" y="' + (y + 3.5) + '" text-anchor="end">' + (Number.isInteger(yv) ? yv : yv.toFixed(1)) + '</text>';
    }
    const n = xLabels.length;
    xLabels.forEach((lb, i) => {
      if (i % everyN !== 0 && i !== n - 1) return;
      const x = M.left + (n === 1 ? plotW / 2 : (i + 0.5) / n * plotW);
      out += '<text x="' + x + '" y="' + (H - 8) + '" text-anchor="middle">' + esc(lb) + '</text>';
    });
    return out;
  }

  // Rounded top (4px data end), square baseline
  function barPath(x, yTop, w, yBase) {
    const r = Math.min(4, w / 2, Math.max(0, yBase - yTop));
    if (yBase - yTop < 1) return '';
    return 'M' + x + ',' + yBase +
      ' L' + x + ',' + (yTop + r) +
      ' Q' + x + ',' + yTop + ' ' + (x + r) + ',' + yTop +
      ' L' + (x + w - r) + ',' + yTop +
      ' Q' + (x + w) + ',' + yTop + ' ' + (x + w) + ',' + (yTop + r) +
      ' L' + (x + w) + ',' + yBase + ' Z';
  }

  // Grouped bars: joined vs served per bucket
  function svgMovement(buckets, W) {
    const H = 240;
    const plotW = W - M.left - M.right, plotH = H - M.top - M.bottom;
    const yMax = niceMax(Math.max(1, ...buckets.map(b => Math.max(b.joined, b.served))));
    const n = buckets.length;
    const band = plotW / Math.max(n, 1);
    const gap = 2; // surface gap between the pair
    const barW = Math.min(24, Math.max(4, (band * 0.62 - gap) / 2));
    const everyN = Math.ceil(n / 10);
    let marks = '', hits = '';
    buckets.forEach((b, i) => {
      const cx = M.left + (i + 0.5) * band;
      const x1 = cx - barW - gap / 2, x2 = cx + gap / 2;
      const y1 = M.top + plotH - (b.joined / yMax) * plotH;
      const y2 = M.top + plotH - (b.served / yMax) * plotH;
      const yBase = M.top + plotH;
      marks += '<path d="' + barPath(x1, y1, barW, yBase) + '" fill="var(--c1)"/>';
      marks += '<path d="' + barPath(x2, y2, barW, yBase) + '" fill="var(--c2)"/>';
      hits += '<rect class="hit" data-i="' + i + '" x="' + (M.left + i * band) + '" y="' + M.top + '" width="' + band + '" height="' + plotH + '" fill="transparent"/>';
    });
    return '<svg class="chart-svg" data-chart="movement" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Entradas e atendimentos por período">' +
      gridAndAxis(W, H, yMax, buckets.map(b => b.label), everyN) + marks + hits + '</svg>';
  }

  // Line: average wait per bucket (single series, gaps on null)
  function svgWait(buckets, W) {
    const H = 220;
    const plotW = W - M.left - M.right, plotH = H - M.top - M.bottom;
    const vals = buckets.map(b => b.avgWait);
    const yMax = niceMax(Math.max(5, ...vals.filter(v => v !== null)));
    const n = buckets.length;
    const px = i => M.left + (n === 1 ? plotW / 2 : (i + 0.5) / n * plotW);
    const py = v => M.top + plotH - (v / yMax) * plotH;
    const everyN = Math.ceil(n / 10);

    let segs = [], seg = [];
    vals.forEach((v, i) => {
      if (v === null) { if (seg.length) segs.push(seg); seg = []; }
      else seg.push([px(i), py(v), i]);
    });
    if (seg.length) segs.push(seg);

    let marks = '';
    segs.forEach(s => {
      const d = s.map((p, j) => (j ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
      if (s.length > 1) {
        marks += '<path d="' + d + ' L' + s[s.length - 1][0].toFixed(1) + ',' + (M.top + plotH) + ' L' + s[0][0].toFixed(1) + ',' + (M.top + plotH) + ' Z" fill="var(--c5)" opacity="0.1" stroke="none"/>';
        marks += '<path d="' + d + '" fill="none" stroke="var(--c5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
      }
    });
    // End marker: 8px dot with 2px surface ring + direct label
    const lastIdx = vals.map((v, i) => v === null ? -1 : i).filter(i => i >= 0).pop();
    if (lastIdx !== undefined) {
      marks += '<circle cx="' + px(lastIdx) + '" cy="' + py(vals[lastIdx]) + '" r="6" fill="var(--surface)"/>' +
        '<circle cx="' + px(lastIdx) + '" cy="' + py(vals[lastIdx]) + '" r="4" fill="var(--c5)"/>' +
        '<text class="dlabel" x="' + Math.min(px(lastIdx) + 9, W - M.right) + '" y="' + (py(vals[lastIdx]) - 8) + '" text-anchor="end">' + vals[lastIdx] + ' min</text>';
    }
    let hits = '';
    buckets.forEach((b, i) => {
      hits += '<rect class="hit" data-i="' + i + '" x="' + (M.left + i * (plotW / n)) + '" y="' + M.top + '" width="' + (plotW / n) + '" height="' + plotH + '" fill="transparent"/>';
    });
    return '<svg class="chart-svg" data-chart="wait" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Tempo médio de espera por período">' +
      gridAndAxis(W, H, yMax, buckets.map(b => b.label), everyN) +
      '<line class="xhair" x1="0" y1="' + M.top + '" x2="0" y2="' + (M.top + plotH) + '" stroke="var(--border-strong)" stroke-width="1" opacity="0"/>' +
      marks + hits + '</svg>';
  }

  // Donut: entry sources (≤3 slices, 2px surface gaps)
  function svgDonut(entries, total) {
    const size = 168, cx = size / 2, cy = size / 2, r = 62, thick = 22;
    if (!total) return '<div class="empty-note">Sem entradas no período.</div>';
    let a0 = -Math.PI / 2, marks = '';
    entries.forEach((s, idx) => {
      const frac = s.value / total;
      const a1 = a0 + frac * Math.PI * 2;
      const large = (a1 - a0) > Math.PI ? 1 : 0;
      const p0 = [cx + r * Math.cos(a0), cy + r * Math.sin(a0)];
      const p1 = [cx + r * Math.cos(a1), cy + r * Math.sin(a1)];
      if (frac >= 0.999) {
        marks += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + s.color + '" stroke-width="' + thick + '" class="slice" data-i="' + idx + '"/>';
      } else {
        marks += '<path class="slice" data-i="' + idx + '" d="M' + p0[0].toFixed(2) + ',' + p0[1].toFixed(2) +
          ' A' + r + ',' + r + ' 0 ' + large + ' 1 ' + p1[0].toFixed(2) + ',' + p1[1].toFixed(2) +
          '" fill="none" stroke="' + s.color + '" stroke-width="' + thick + '" stroke-linecap="butt"/>';
        // 2px surface gap at slice boundary
        marks += '<line x1="' + cx + '" y1="' + cy + '" x2="' + (cx + (r + thick) * Math.cos(a0)) + '" y2="' + (cy + (r + thick) * Math.sin(a0)) + '" stroke="var(--surface)" stroke-width="2"/>';
      }
      a0 = a1;
    });
    return '<svg class="chart-svg" data-chart="sources" viewBox="0 0 ' + size + ' ' + size + '" style="max-width:' + size + 'px;flex:0 0 auto" role="img" aria-label="Origem das entradas">' +
      marks +
      '<text x="' + cx + '" y="' + (cy - 2) + '" text-anchor="middle" style="font-family:var(--font-body);font-weight:800;font-size:30px;fill:var(--fg-1)">' + total + '</text>' +
      '<text x="' + cx + '" y="' + (cy + 18) + '" text-anchor="middle">entradas</text>' +
      '</svg>';
  }

  // Horizontal bars: served per counter (nominal → single hue, slot 1)
  function svgCounters(perCounter, W) {
    const rowH = 42, H = perCounter.length * rowH + 12;
    const left = 74, right = 44;
    const plotW = W - left - right;
    const vMax = Math.max(1, ...perCounter.map(c => c.served));
    let out = '';
    perCounter.forEach((c, i) => {
      const y = 8 + i * rowH;
      const w = Math.max(2, (c.served / vMax) * plotW);
      const barH = 18;
      // rounded data-end (right), square at baseline (left)
      const r = Math.min(4, w / 2);
      out += '<text x="' + (left - 10) + '" y="' + (y + barH / 2 + 4) + '" text-anchor="end" style="font-family:var(--font-body);font-weight:600;font-size:12px;fill:var(--fg-2)">' + esc(c.name) + '</text>';
      out += '<path class="hbar" data-i="' + i + '" d="M' + left + ',' + y +
        ' L' + (left + w - r) + ',' + y +
        ' Q' + (left + w) + ',' + y + ' ' + (left + w) + ',' + (y + r) +
        ' L' + (left + w) + ',' + (y + barH - r) +
        ' Q' + (left + w) + ',' + (y + barH) + ' ' + (left + w - r) + ',' + (y + barH) +
        ' L' + left + ',' + (y + barH) + ' Z" fill="var(--c1)"/>';
      out += '<text class="dlabel" x="' + (left + w + 9) + '" y="' + (y + barH / 2 + 4) + '">' + c.served + '</text>';
    });
    return '<svg class="chart-svg" data-chart="counters" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Atendimentos por balcão">' + out + '</svg>';
  }

  function sparkline(series, w, h, color) {
    if (!series.length) return '';
    const max = Math.max(1, ...series);
    const n = series.length;
    const pts = series.map((v, i) => [(i / Math.max(n - 1, 1)) * w, h - (v / max) * (h - 2) - 1]);
    const d = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
    const last = pts[pts.length - 1];
    return '<svg class="kpi-spark" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
      '<path d="' + d + '" fill="none" stroke="var(--border-strong)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
      '<circle cx="' + last[0] + '" cy="' + last[1] + '" r="3" fill="' + color + '"/></svg>';
  }

  // ---- TABLE VIEWS (the WCAG-clean twin of each chart) ----
  function tableMovement(buckets) {
    return '<table class="tbl"><thead><tr><th>Período</th><th>Entradas</th><th>Atendimentos</th></tr></thead><tbody>' +
      buckets.map(b => '<tr><td>' + esc(b.label) + '</td><td>' + b.joined + '</td><td>' + b.served + '</td></tr>').join('') +
      '</tbody></table>';
  }
  function tableWait(buckets) {
    return '<table class="tbl"><thead><tr><th>Período</th><th>Espera média (min)</th></tr></thead><tbody>' +
      buckets.map(b => '<tr><td>' + esc(b.label) + '</td><td>' + (b.avgWait === null ? '—' : b.avgWait) + '</td></tr>').join('') +
      '</tbody></table>';
  }
  function tableSources(entries, total) {
    return '<table class="tbl"><thead><tr><th>Origem</th><th>Entradas</th><th>%</th></tr></thead><tbody>' +
      entries.map(s => '<tr><td>' + esc(s.label) + '</td><td>' + s.value + '</td><td>' + (total ? Math.round(s.value / total * 100) : 0) + '%</td></tr>').join('') +
      '</tbody></table>';
  }
  function tableCounters(perCounter) {
    return '<table class="tbl"><thead><tr><th>Balcão</th><th>Atendimentos</th></tr></thead><tbody>' +
      perCounter.map(c => '<tr><td>' + esc(c.name) + '</td><td>' + c.served + '</td></tr>').join('') +
      '</tbody></table>';
  }

  // ---- RENDER ----
  function chartWidth() {
    const app = document.getElementById('app');
    const w = Math.min(app.clientWidth || 1256, 1256);
    // grid is 2 columns above 1024px
    return (window.innerWidth > 1024 ? (w - 16) / 2 : w) - 40;
  }

  function render() {
    const app = document.getElementById('app');
    if (!metrics) {
      app.innerHTML = renderHeader() +
        '<div style="text-align:center;padding:80px 20px;color:var(--fg-3);font-size:16px">Conectando ao servidor…</div>';
      return;
    }
    const m = metrics;
    const W = Math.max(chartWidth(), 320);
    const total = m.sources.qr + m.sources.senha + m.sources.passou;
    const sourceEntries = [
      { label: SOURCE_LABELS.qr, value: m.sources.qr, color: COLORS.c1 },
      { label: SOURCE_LABELS.senha, value: m.sources.senha, color: COLORS.c2 },
      { label: SOURCE_LABELS.passou, value: m.sources.passou, color: COLORS.c3 },
    ];

    app.innerHTML = renderHeader() +
      renderFilters(m) +
      renderHealth(m) +
      renderKpis(m) +
      '<div class="grid">' +
        card('movement', 'Movimento', 'entradas × atendimentos · ' + RANGE_LABELS[m.range],
          legend([{ label: 'Entradas', color: COLORS.c1, mark: 'rect' }, { label: 'Atendimentos', color: COLORS.c2, mark: 'rect' }]),
          tableMode.movement ? tableMovement(m.buckets) : '<div class="chart-box">' + svgMovement(m.buckets, W) + '</div>') +
        card('wait', 'Tempo de espera', 'média por período, em minutos', '',
          tableMode.wait ? tableWait(m.buckets) : '<div class="chart-box">' + svgWait(m.buckets, W) + '</div>') +
        card('sources', 'Origem das entradas', 'como as pessoas entraram na fila', '',
          tableMode.sources ? tableSources(sourceEntries, total) :
          '<div class="donut-wrap">' + svgDonut(sourceEntries, total) +
            '<div class="donut-legend" style="flex:1">' + sourceEntries.map(s =>
              '<div class="donut-row"><span class="legend-swatch" style="background:' + s.color + '"></span>' +
              '<span class="name">' + esc(s.label) + '</span><span class="val">' + s.value + '</span>' +
              '<span class="pct">' + (total ? Math.round(s.value / total * 100) : 0) + '%</span></div>').join('') +
            '</div></div>') +
        card('counters', 'Atendimentos por balcão', 'produtividade no período', '',
          tableMode.counters ? tableCounters(m.perCounter) : '<div class="chart-box">' + svgCounters(m.perCounter, W) + '</div>') +
      '</div>';

    bindEvents(m, sourceEntries, total);
  }

  function renderHeader() {
    return '<header class="header">' +
      '<div class="header-brand">' + BIRD_SVG +
        '<div style="line-height:1.1">' +
          '<div class="header-brand-sub">Fila virtual</div>' +
          '<div class="header-brand-title">Visão geral</div>' +
        '</div>' +
      '</div>' +
      '<div class="live-badge ' + (connected ? 'connected' : 'disconnected') + '">' +
        '<span class="live-dot"></span><span class="live-text">' + (connected ? 'ao vivo' : 'offline') + '</span>' +
      '</div>' +
      '<div class="header-right">' +
        '<a href="index.html" class="link-nav">Painel do operador →</a>' +
        '<div class="clock">' + esc(clockNow()) + '</div>' +
      '</div>' +
    '</header>';
  }

  function renderFilters(m) {
    return '<div class="filters">' +
      '<span class="filters-label">Período</span>' +
      ['today', '4h', '1h'].map(r =>
        '<button class="range-btn' + (range === r ? ' active' : '') + '" data-range="' + r + '">' + RANGE_LABELS[r] + '</button>'
      ).join('') +
      '<span class="updated-at">atualizado ' + new Date(m.generatedAt).toTimeString().slice(0, 8) +
        (latencyMs !== null ? ' · ' + latencyMs + ' ms' : '') + '</span>' +
    '</div>';
  }

  function renderHealth(m) {
    const h = m.health;
    const api = { cls: 'ok', text: 'online', icon: checkIcon() };
    const lat = latencyMs === null ? { cls: 'err', text: '—' } :
      latencyMs > 800 ? { cls: 'warn', text: latencyMs + ' ms' } : { cls: 'ok', text: latencyMs + ' ms' };
    const wsIt = connected ? { cls: 'ok', text: h.wsClients + ' conectado' + (h.wsClients === 1 ? '' : 's') } : { cls: 'warn', text: 'reconectando…' };
    const items = [
      { label: 'API', cls: api.cls, value: api.text, icon: checkIcon() },
      { label: 'Latência', cls: lat.cls, value: lat.text, icon: boltIcon() },
      { label: 'Tempo real (WS)', cls: wsIt.cls, value: wsIt.text, icon: wifiIcon() },
      { label: 'Uptime', cls: 'neutral', value: fmtUptime(h.uptimeSec), icon: clockIcon() },
      { label: 'Memória', cls: h.memoryMb > 400 ? 'warn' : 'neutral', value: h.memoryMb + ' MB', icon: chipIcon() },
      { label: 'Eventos', cls: 'neutral', value: String(h.eventsStored), icon: listIcon() },
    ];
    return '<div class="health">' + items.map(it =>
      '<div class="health-item"><div class="health-icon ' + it.cls + '">' + it.icon + '</div>' +
      '<div><div class="health-label">' + esc(it.label) + '</div><div class="health-value">' + esc(it.value) + '</div></div></div>'
    ).join('') + '</div>';
  }

  function renderKpis(m) {
    const k = m.kpis;
    const servedSeries = m.buckets.map(b => b.served);
    const tiles = [
      { label: 'Na fila agora', value: k.waitingNow, sub: k.callingNow + ' em atendimento' },
      { label: 'Atendidos', value: k.served, sub: 'de ' + k.joined + ' entradas', spark: sparkline(servedSeries, 74, 26, COLORS.c2) },
      { label: 'Espera média', value: k.avgWait + ' min', sub: 'p90: ' + k.p90Wait + ' min' },
      { label: 'Taxa de ausência', value: k.absentRate + '%', sub: k.absent + ' não compareceram' },
      { label: 'Vazão', value: k.throughputHour, sub: 'atendimentos / hora' },
    ];
    return '<div class="kpis">' + tiles.map(t =>
      '<div class="kpi"><div class="kpi-label">' + esc(t.label) + '</div>' +
      '<div class="kpi-value">' + esc(String(t.value)) + '</div>' +
      '<div class="kpi-sub">' + esc(t.sub) + '</div>' + (t.spark || '') + '</div>'
    ).join('') + '</div>';
  }

  function legend(items) {
    return '<div class="legend">' + items.map(it =>
      '<span class="legend-item"><span class="' + (it.mark === 'line' ? 'legend-line' : 'legend-swatch') + '" style="background:' + it.color + '"></span>' + esc(it.label) + '</span>'
    ).join('') + '</div>';
  }

  function card(id, title, sub, legendHtml, body) {
    return '<section class="card" data-card="' + id + '">' +
      '<div class="card-head"><span class="card-title">' + esc(title) + '</span>' +
      '<span class="card-sub">' + esc(sub) + '</span>' +
      '<button class="btn-table' + (tableMode[id] ? ' active' : '') + '" data-tbl="' + id + '">' + (tableMode[id] ? 'Gráfico' : 'Tabela') + '</button></div>' +
      legendHtml + body + '</section>';
  }

  // ---- ICONS (16px, stroke currentColor) ----
  function ic(paths) { return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' + paths + '</svg>'; }
  function checkIcon() { return ic('<path d="M20 6L9 17l-5-5"/>'); }
  function boltIcon() { return ic('<path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>'); }
  function wifiIcon() { return ic('<path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/>'); }
  function clockIcon() { return ic('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>'); }
  function chipIcon() { return ic('<rect x="5" y="5" width="14" height="14" rx="2"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/>'); }
  function listIcon() { return ic('<path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/>'); }

  // ---- EVENTS ----
  function bindEvents(m, sourceEntries, total) {
    document.querySelectorAll('[data-range]').forEach(btn => {
      btn.addEventListener('click', function() {
        range = this.dataset.range;
        fetchMetrics();
      });
    });
    document.querySelectorAll('[data-tbl]').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.tbl;
        tableMode[id] = !tableMode[id];
        render();
      });
    });

    // Movement bars: per-bucket tooltip (both series at that X)
    const mov = document.querySelector('svg[data-chart="movement"]');
    if (mov) mov.querySelectorAll('.hit').forEach(r => {
      r.addEventListener('pointermove', e => {
        const b = m.buckets[+r.dataset.i];
        showTip(e.clientX, e.clientY, tipHtml(b.label, [
          { label: 'Entradas', value: b.joined, color: COLORS.c1 },
          { label: 'Atendimentos', value: b.served, color: COLORS.c2 },
        ]));
      });
      r.addEventListener('pointerleave', hideTip);
    });

    // Wait line: crosshair + tooltip
    const wait = document.querySelector('svg[data-chart="wait"]');
    if (wait) {
      const xhair = wait.querySelector('.xhair');
      wait.querySelectorAll('.hit').forEach(r => {
        r.addEventListener('pointermove', e => {
          const i = +r.dataset.i;
          const b = m.buckets[i];
          const cx = +r.getAttribute('x') + (+r.getAttribute('width')) / 2;
          xhair.setAttribute('x1', cx); xhair.setAttribute('x2', cx);
          xhair.setAttribute('opacity', '1');
          showTip(e.clientX, e.clientY, tipHtml(b.label, [
            { label: 'Espera média', value: b.avgWait === null ? 'sem chamadas' : b.avgWait + ' min', color: COLORS.c5 },
          ]));
        });
        r.addEventListener('pointerleave', () => { xhair.setAttribute('opacity', '0'); hideTip(); });
      });
    }

    // Donut slices
    const donut = document.querySelector('svg[data-chart="sources"]');
    if (donut) donut.querySelectorAll('.slice').forEach(sl => {
      sl.addEventListener('pointermove', e => {
        const s = sourceEntries[+sl.dataset.i];
        showTip(e.clientX, e.clientY, tipHtml('Origem das entradas', [
          { label: s.label, value: s.value + ' (' + (total ? Math.round(s.value / total * 100) : 0) + '%)', color: s.color },
        ]));
      });
      sl.addEventListener('pointerleave', hideTip);
    });

    // Counter bars
    const cnt = document.querySelector('svg[data-chart="counters"]');
    if (cnt) cnt.querySelectorAll('.hbar').forEach(bar => {
      bar.addEventListener('pointermove', e => {
        const c = m.perCounter[+bar.dataset.i];
        showTip(e.clientX, e.clientY, tipHtml(c.name, [
          { label: 'Atendimentos', value: c.served, color: COLORS.c1 },
        ]));
      });
      bar.addEventListener('pointerleave', hideTip);
    });
  }

  // ---- BOOT ----
  connectWs();
  render();
  fetchMetrics();
  setInterval(fetchMetrics, 20000);           // poll fallback
  let resizeT = null;
  window.addEventListener('resize', () => {   // re-render charts at new width
    clearTimeout(resizeT); resizeT = setTimeout(render, 180);
  });
  setInterval(() => {
    const el = document.querySelector('.clock');
    if (el) el.textContent = clockNow();
  }, 1000);
})();
</script>
</body>
</html>
