<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fila Virtual - Cliente</title>
<meta name="theme-color" content="#f0efeb">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/mutum-design-system.css">
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js?v=5").catch(function() {});
  });
}
</script>
<style>
  *{box-sizing:border-box}
  html,body{min-height:100%;margin:0}
  body{background:#dedbd3;color:var(--fg-1);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
  button,input{font:inherit}
  button{cursor:pointer}
  button:focus-visible,input:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px}
  .page{min-height:100vh;display:grid;place-items:center;padding:24px}
  .device{position:relative;width:min(430px,100%);height:min(884px,calc(100vh - 48px));min-height:620px;background:var(--bg);border:1px solid var(--border);border-radius:32px;box-shadow:var(--shadow-xl);overflow:hidden}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);animation:screenIn 280ms var(--ease-out)}
  .scroll{min-height:0;overflow:auto;overscroll-behavior:contain}
  .pad{padding:36px 26px 26px}
  .brand{display:flex;align-items:center;gap:9px}
  .brand img{width:24px;height:30px;object-fit:contain}
  .brand strong{font-family:var(--font-display);font-size:14px;font-weight:600}
  .eyebrow{font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--primary)}
  h1,h2,h3,p{margin-top:0}
  h1{font-family:var(--font-display);font-weight:700;font-size:30px;line-height:1.08;letter-spacing:0;margin-bottom:12px}
  h2{font-family:var(--font-display);font-weight:700;font-size:28px;line-height:1.1;letter-spacing:0;margin-bottom:8px}
  p{font-size:15px;line-height:1.5;color:var(--fg-2)}
  .intro{margin-top:30px}
  .scanner-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:18px 0;min-height:250px}
  .scanner{position:relative;width:232px;aspect-ratio:1;border:0;padding:0;border-radius:24px;background:var(--mutum-ink);overflow:hidden;box-shadow:var(--shadow-lg);color:inherit}
  button.scanner{cursor:pointer}
  button.scanner:focus-visible{outline:3px solid var(--primary);outline-offset:4px}
  .scanner-grid{position:absolute;inset:48px;display:grid;grid-template-columns:repeat(9,1fr);gap:5px;opacity:.17}
  .scanner-grid span{background:var(--mutum-cream);border-radius:2px}
  .corner{position:absolute;width:32px;height:32px;border-color:var(--mutum-coral);border-style:solid}
  .corner.tl{top:18px;left:18px;border-width:3px 0 0 3px;border-radius:10px 0 0}
  .corner.tr{top:18px;right:18px;border-width:3px 3px 0 0;border-radius:0 10px 0 0}
  .corner.bl{bottom:18px;left:18px;border-width:0 0 3px 3px;border-radius:0 0 0 10px}
  .corner.br{right:18px;bottom:18px;border-width:0 3px 3px 0;border-radius:0 0 10px}
  .scan-line{position:absolute;left:24px;right:24px;top:20%;height:2px;background:var(--mutum-coral);box-shadow:0 0 14px var(--mutum-coral);animation:scanmove 2.4s var(--ease-in-out) infinite}
  .recognized{position:absolute;left:16px;right:16px;bottom:12px;z-index:2;padding:4px 6px;background:var(--mutum-ink);text-align:center;color:var(--mutum-bone);font-family:var(--font-mono);font-size:11px}
  .join-form{display:grid;gap:10px}
  .scan-actions{display:grid;gap:10px}
  .field{width:100%;border:1px solid var(--border-strong);border-radius:12px;background:var(--surface);color:var(--fg-1);padding:14px 15px;outline:none}
  .field:focus{border-color:var(--primary)}
  .btn{appearance:none;border:0;border-radius:12px;padding:15px 16px;font-weight:700;font-size:15px;transition:background var(--dur-fast),transform 100ms var(--ease-out)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-primary{background:var(--primary);color:var(--on-primary);box-shadow:var(--shadow-red)}
  .btn-primary:hover{background:var(--primary-hover)}
  .btn-secondary{background:var(--surface);color:var(--fg-1);border:1px solid var(--border-strong)}
  .btn-quiet{background:transparent;color:var(--fg-2);box-shadow:none}
  .privacy{text-align:center;font-size:12px;color:var(--fg-3);margin:10px 0 0}
  .confirm-body{flex:1;display:flex;flex-direction:column;justify-content:center}
  .success-icon{width:60px;height:60px;border-radius:999px;background:#eaf3ec;color:var(--mutum-forest);display:grid;place-items:center}
  .success-icon svg{width:30px;height:30px}
  .ticket-card{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:var(--shadow-sm)}
  .ticket-code{font-family:var(--font-display);font-weight:700;font-size:44px;line-height:1;color:var(--fg-1);margin-top:5px}
  .divider{height:1px;background:var(--border);margin:18px 0}
  .ticket-stats{display:grid;grid-template-columns:1fr 1px 1fr;gap:16px}
  .vline{background:var(--border)}
  .metric strong{display:block;font-family:var(--font-display);font-size:22px}
  .metric span{display:block;font-size:13px;color:var(--fg-2);margin-top:2px}
  .note{margin-top:14px;padding:14px 16px;background:var(--bg-3);border-radius:14px;font-size:13px;line-height:1.5;color:var(--fg-2)}
  .bottom-actions{display:grid;gap:7px}
  .status-header{display:flex;align-items:center;gap:10px;padding:17px 20px;border-bottom:1px solid var(--border)}
  .status-header img{width:23px;height:30px;object-fit:contain}
  .venue{flex:1;line-height:1.15}
  .venue small{display:block;font-family:var(--font-display);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--fg-3)}
  .venue strong{font-family:var(--font-display);font-size:16px}
  .live{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#eaf3ec;border:1px solid #bbd9c4;color:var(--mutum-forest);font-size:11px;font-weight:700}
  .live.off{background:#fbf1dd;border-color:#ead3a0;color:#8a5a12}
  .live-dot{width:7px;height:7px;border-radius:999px;background:currentColor;animation:pulseDot 1.6s infinite}
  .status-content{flex:1;padding:20px}
  .segments{display:flex;gap:4px;padding:4px;background:var(--bg-3);border-radius:12px;margin-bottom:22px}
  .segment{flex:1;border:0;border-radius:9px;padding:9px;background:transparent;color:var(--fg-3);font-weight:700;font-size:13px}
  .segment.active{background:var(--surface);color:var(--fg-1);box-shadow:var(--shadow-sm)}
  .position-view{text-align:center}
  .ring{position:relative;width:204px;height:204px;margin:0 auto}
  .ring svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ring circle{fill:none;stroke-width:13}
  .ring-bg{stroke:var(--bg-3)}
  .ring-progress{stroke:var(--primary);stroke-linecap:round;transition:stroke-dashoffset 600ms var(--ease-out)}
  .ring-copy{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .ring-copy strong{font-family:var(--font-display);font-size:58px;line-height:1}
  .ring-copy span{font-size:13px;color:var(--fg-2);margin-top:4px}
  .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:22px}
  .mini-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:left}
  .mini-card small{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--fg-3)}
  .mini-card strong{display:block;font-family:var(--font-display);font-size:24px;margin-top:4px}
  .updated{display:flex;justify-content:center;align-items:center;gap:6px;color:var(--fg-3);font-size:12px;margin-top:14px}
  .updated span{width:6px;height:6px;border-radius:999px;background:var(--mutum-leaf);animation:pulseDot 1.6s infinite}
  .progress-label{display:flex;justify-content:space-between;font-size:13px;color:var(--fg-2)}
  .progress-label strong{font-family:var(--font-mono);color:var(--fg-1)}
  .progress{height:10px;border-radius:999px;background:var(--bg-3);overflow:hidden;margin-top:8px}
  .progress span{display:block;height:100%;background:var(--primary);border-radius:999px;transition:width 600ms var(--ease-out)}
  .timeline{margin-top:24px}
  .timeline-row{display:grid;grid-template-columns:14px 1fr;gap:12px;min-height:68px}
  .timeline-mark{display:flex;flex-direction:column;align-items:center}
  .timeline-mark i{width:12px;height:12px;border-radius:999px;background:var(--mutum-sand);margin-top:3px}
  .timeline-mark b{flex:1;width:2px;background:var(--border);margin:2px 0}
  .timeline-row.current .timeline-mark i{background:var(--mutum-leaf)}
  .timeline-row.you .timeline-mark i{width:14px;height:14px;background:var(--primary);box-shadow:0 0 0 4px var(--mutum-blush)}
  .timeline-copy strong{font-family:var(--font-mono);font-size:15px}
  .timeline-copy span{display:block;font-size:13px;color:var(--fg-3);margin-top:3px}
  .you-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow-sm)}
  .you-card header{display:flex;justify-content:space-between;align-items:center}
  .you-card em{font-style:normal;font-size:11px;font-weight:700;color:var(--primary);background:var(--mutum-blush);padding:3px 9px;border-radius:999px}
  .reminder{margin-top:22px;display:flex;gap:12px;align-items:center;padding:14px 16px;border-radius:14px;background:#fbf1dd;border:1px solid #ead3a0;color:#8a5a12}
  .reminder svg{flex:0 0 auto}
  .reminder-copy{flex:1;line-height:1.35}
  .reminder-copy strong{font-size:14px}
  .reminder-copy span{display:block;font-size:12px;color:#9a6a22}
  .reminder button{border:1px solid #c99a3a;background:transparent;color:#8a5a12;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700}
  .called{background:color-mix(in oklch,var(--primary) 12%,var(--surface));border:1px solid color-mix(in oklch,var(--primary) 45%,transparent);border-radius:18px;padding:22px;text-align:left;margin-bottom:18px;animation:popIn 280ms var(--ease-out)}
  .called .ticket-code{color:var(--primary);font-size:54px}
  .called h2{font-size:20px;margin:10px 0 4px}
  .status-footer{padding:14px 20px max(20px,env(safe-area-inset-bottom));border-top:1px solid var(--border);display:grid;gap:7px;background:var(--bg)}
  .ad{display:none;margin-top:14px;border:1px dashed var(--border-strong);border-radius:12px;padding:12px;text-align:center;color:var(--fg-3);font-size:12px;background:var(--bg-2)}
  .ad.show{display:block}
  .sheet-backdrop{position:absolute;inset:0;background:rgba(25,25,25,.5);z-index:10;animation:fadeIn 180ms ease}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:11;background:var(--surface);border-radius:24px 24px 0 0;padding:24px 22px max(24px,env(safe-area-inset-bottom));box-shadow:var(--shadow-xl);animation:sheetUp 260ms var(--ease-out)}
  .sheet-handle{width:42px;height:4px;border-radius:999px;background:var(--border-strong);margin:0 auto 20px}
  .sheet h3{font-family:var(--font-display);font-size:22px;margin-bottom:8px}
  .sheet-actions{display:grid;gap:9px;margin-top:18px}
  .toast{position:fixed;left:50%;bottom:28px;z-index:50;transform:translate(-50%,120px);width:min(390px,calc(100% - 32px));background:var(--mutum-ink-2);color:var(--mutum-cream);border:1px solid #4a4742;border-radius:13px;padding:13px 18px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);transition:transform 220ms var(--ease-out)}
  .toast.on{transform:translate(-50%,0)}
  @keyframes scanmove{0%{top:14%}50%{top:82%}100%{top:14%}}
  @keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  @keyframes screenIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:520px){
    body{background:var(--bg)}
    .page{display:block;padding:0}
    .device{width:100%;height:100dvh;min-height:560px;border:0;border-radius:0;box-shadow:none}
    .pad{padding:28px 22px 22px}
  }
  @media(max-height:700px) and (min-width:521px){
    .device{min-height:0;height:calc(100vh - 24px)}
    .page{padding:12px}
    .scanner{width:190px}
    .scanner-wrap{min-height:205px}
  }
</style>

<script src="ads.js"></script>

<body>
<main class="page">
  <section class="device" id="app" aria-live="polite"></section>
</main>
<div class="toast" id="toast" role="status"></div>
<script>
(function() {
  "use strict";
  var API_BASE = window.FILA_API_BASE || "";
  var WS_BASE = window.FILA_WS_BASE || "";
  var STORAGE_KEY = "fila_virtual_ticket_id";
  var TOKEN_KEY = "fila_virtual_qr_token";
  var params = new URLSearchParams(window.location.search);
  var nativeApp = window.FilaNativeApp || null;
  var nativeAds = window.FilaNativeAds || null;
  var isNativeApp = !!nativeApp || /FilaAppAndroid\//.test(navigator.userAgent);
  var scannedToken = params.get("token") || params.get("qr");
  var qrToken = scannedToken || localStorage.getItem(TOKEN_KEY) || (isNativeApp ? "" : "demo-centro");
  if (scannedToken) localStorage.setItem(TOKEN_KEY, scannedToken);
  var config = { venue: { name: "Clínica Centro", qrToken: qrToken }, monetization: { plan: "free", adsEnabled: true } };
  var state = null;
  var ticket = null;
  var connected = false;
  var busy = false;
  var passOpen = false;
  var view = "position";
  var confirmation = false;
  var toastTimer = null;
  var app = document.getElementById("app");
  var toast = document.getElementById("toast");

  function esc(value) {
    var div = document.createElement("div");
    div.textContent = value == null ? "" : String(value);
    return div.innerHTML;
  }

  function flash(message) {
    clearTimeout(toastTimer);
    toast.textContent = message;
    toast.classList.add("on");
    toastTimer = setTimeout(function() { toast.classList.remove("on"); }, 3000);
  }

  async function api(method, path, body) {
    var response = await fetch(API_BASE + path, {
      method: method,
      headers: body ? { "Content-Type": "application/json" } : {},
      body: body ? JSON.stringify(body) : undefined
    });
    var data = await response.json().catch(function() { return {}; });
    if (!response.ok) throw new Error(data.error || "Algo travou do nosso lado. Tente de novo.");
    return data;
  }

  function computeTicket() {
    if (!ticket || !state) return ticket;
    var fresh = state.tickets.find(function(item) { return item.id === ticket.id; });
    if (!fresh) return ticket;
    var waiting = state.tickets.filter(function(item) { return item.status === "waiting"; });
    var index = waiting.findIndex(function(item) { return item.id === fresh.id; });
    return Object.assign({}, ticket, fresh, {
      position: index >= 0 ? index + 1 : 0,
      ahead: index >= 0 ? index : 0,
      etaMin: index >= 0 ? Math.max(2, index * 4 + 3) : 0
    });
  }

  function iconCheck() {
    return "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><polyline points=\"20 6 9 17 4 12\"></polyline></svg>";
  }

  function iconBell() {
    return "<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9\"></path><path d=\"M13.7 21a2 2 0 0 1-3.4 0\"></path></svg>";
  }

  function brand() {
    return "<div class=\"brand\"><img src=\"assets/mark-bird.svg\" alt=\"Mutum\"><strong>Fila virtual</strong></div>";
  }

  function adsEnabled() {
    return !!(config.monetization && config.monetization.adsEnabled && !nativeAds);
  }

  function syncNativeAds() {
    if (!nativeAds || typeof nativeAds.setAdsEnabled !== "function") return;
    nativeAds.setAdsEnabled(!!(config.monetization && config.monetization.adsEnabled));
  }

  function showNativeInterstitial(placement) {
    if (!nativeAds || typeof nativeAds.showInterstitial !== "function") return;
    if (config.monetization && config.monetization.adsEnabled) nativeAds.showInterstitial(placement);
  }

  function scanNativeQr(purpose) {
    if (!nativeApp || typeof nativeApp.scanQrCode !== "function") {
      flash("O leitor de QR está disponível no aplicativo Android.");
      return;
    }
    nativeApp.scanQrCode(purpose || "entry");
  }

  function renderEntry() {
    var cells = "";
    for (var i = 0; i < 45; i += 1) cells += "<span></span>";
    var scannerTag = isNativeApp ? "button type=\"button\" id=\"scanQr\"" : "div";
    var scannerClose = isNativeApp ? "button" : "div";
    var scannerLabel = qrToken ? "Código da unidade reconhecido" : "Toque para ler o QR code";
    var entryAction = qrToken
      ? ["<form class=\"join-form\" id=\"joinForm\"><input class=\"field\" name=\"name\" maxlength=\"28\" autocomplete=\"given-name\" placeholder=\"Seu primeiro nome\" aria-label=\"Seu primeiro nome\" required>",
          "<button class=\"btn btn-primary\" ", busy ? "disabled" : "", ">Entrar na fila</button>",
          isNativeApp ? "<button class=\"btn btn-quiet\" type=\"button\" id=\"rescanQr\">Ler outro QR code</button>" : "", "</form>"].join("")
      : "<div class=\"scan-actions\"><button class=\"btn btn-primary\" type=\"button\" id=\"startScan\">Ler QR code</button></div>";
    app.innerHTML = [
      "<div class=\"screen pad scroll\">",
      brand(),
      "<div class=\"intro\"><h1>Entre na fila pelo QR code</h1><p>Aponte a câmera para o QR code no balcão. A gente avisa por aqui quando for sua vez.</p></div>",
      "<div class=\"scanner-wrap\"><", scannerTag, " class=\"scanner\" aria-label=\"Ler QR code da unidade\"><div class=\"scanner-grid\">", cells, "</div>",
      "<i class=\"corner tl\"></i><i class=\"corner tr\"></i><i class=\"corner bl\"></i><i class=\"corner br\"></i><i class=\"scan-line\"></i>",
      "<div class=\"recognized\">", scannerLabel, "</div></", scannerClose, "></div>",
      entryAction,
      "<p class=\"privacy\">Seus dados ficam só no seu aparelho.</p>",
      "<div class=\"ad ", adsEnabled() ? "show" : "", "\" data-ad-slot=\"queue-join-bottom\">Espaço reservado para anúncio</div>",
      "</div>"
    ].join("");
    var joinForm = document.getElementById("joinForm");
    if (joinForm) joinForm.addEventListener("submit", joinQueue);
    ["scanQr", "startScan", "rescanQr"].forEach(function(id) {
      var button = document.getElementById(id);
      if (button) button.addEventListener("click", function() { scanNativeQr("entry"); });
    });
  }

  function renderConfirmation() {
    app.innerHTML = [
      "<div class=\"screen pad\"><div class=\"confirm-body\"><div class=\"success-icon\">", iconCheck(), "</div>",
      "<h2 style=\"margin-top:22px\">Você entrou na fila</h2>",
      "<p>", esc(config.venue.name || "Clínica Centro"), "</p>",
      "<div class=\"ticket-card\"><div class=\"eyebrow\">Sua senha</div><div class=\"ticket-code\">", esc(ticket.code), "</div><div class=\"divider\"></div>",
      "<div class=\"ticket-stats\"><div class=\"metric\"><strong>", esc(ticket.ahead || 0), "</strong><span>pessoas na sua frente</span></div><div class=\"vline\"></div>",
      "<div class=\"metric\"><strong>~", esc(ticket.etaMin || 3), " min</strong><span>tempo de espera</span></div></div></div>",
      "<div class=\"note\">A gente chama por aqui. Pode fechar o app, é só voltar para acompanhar.</div></div>",
      "<div class=\"bottom-actions\"><button class=\"btn btn-primary\" id=\"follow\">Acompanhar minha vez</button><button class=\"btn btn-quiet\" id=\"leave\">Sair da fila</button></div></div>"
    ].join("");
    document.getElementById("follow").addEventListener("click", function() { confirmation = false; render(); });
    document.getElementById("leave").addEventListener("click", leaveDevice);
  }

  function renderTimeline() {
    var ahead = ticket.ahead || 0;
    var calling = state && state.tickets ? state.tickets.find(function(item) { return item.status === "calling"; }) : null;
    var waiting = state && state.tickets ? state.tickets.filter(function(item) { return item.status === "waiting"; }) : [];
    var ticketIndex = waiting.findIndex(function(item) { return item.id === ticket.id; });
    var aheadTickets = ticketIndex > 0 ? waiting.slice(0, ticketIndex) : [];
    var currentCode = calling ? calling.code : (aheadTickets[0] ? aheadTickets[0].code : "Próxima senha");
    var currentLabel = calling ? "Chamando agora" + (calling.counter ? " · Balcão " + calling.counter : "") : "Aguardando chamada";
    var waitingCodes = aheadTickets.map(function(item) { return item.code; }).join(" · ");
    var total = Math.max(1, ahead + 1);
    var pct = Math.max(8, Math.min(100, Math.round(100 / total)));
    return [
      "<div class=\"progress-label\"><span>Sua posição na fila</span><strong>", esc(ticket.position || 1), "ª</strong></div>",
      "<div class=\"progress\"><span style=\"width:", pct, "%\"></span></div>",
      "<div class=\"timeline\"><div class=\"timeline-row current\"><div class=\"timeline-mark\"><i></i><b></b></div><div class=\"timeline-copy\"><strong>", esc(currentCode), "</strong><span style=\"color:var(--mutum-forest);font-weight:600\">", esc(currentLabel), "</span></div></div>",
      aheadTickets.length ? "<div class=\"timeline-row\"><div class=\"timeline-mark\"><i></i><b></b></div><div class=\"timeline-copy\"><strong>" + esc(waitingCodes) + "</strong><span>" + esc(aheadTickets.length) + " pessoas aguardando antes de você</span></div></div>" : "",
      "<div class=\"timeline-row you\"><div class=\"timeline-mark\"><i></i></div><div class=\"timeline-copy you-card\"><header><strong>", esc(ticket.code), "</strong><em>Você</em></header><span>Espera estimada ~", esc(ticket.etaMin || 3), " min</span></div></div></div>"
    ].join("");
  }

  function renderPosition() {
    var ahead = ticket.ahead || 0;
    var circumference = 552.92;
    var progress = Math.max(.08, Math.min(1, 1 / Math.max(1, ahead + 1)));
    var offset = circumference * (1 - progress);
    return [
      "<div class=\"position-view\"><div class=\"ring\"><svg viewBox=\"0 0 200 200\" aria-hidden=\"true\"><circle class=\"ring-bg\" cx=\"100\" cy=\"100\" r=\"88\"></circle>",
      "<circle class=\"ring-progress\" cx=\"100\" cy=\"100\" r=\"88\" stroke-dasharray=\"", circumference, "\" stroke-dashoffset=\"", offset, "\"></circle></svg>",
      "<div class=\"ring-copy\"><strong>", esc(ahead), "</strong><span>pessoas na sua frente</span></div></div>",
      "<div class=\"mini-grid\"><div class=\"mini-card\"><small>Sua senha</small><strong>", esc(ticket.code), "</strong></div>",
      "<div class=\"mini-card\"><small>Espera</small><strong>~", esc(ticket.etaMin || 3), " min</strong></div></div>",
      "<div class=\"updated\"><span></span>Atualizado agora</div></div>"
    ].join("");
  }

  function renderStatus() {
    var calling = ticket.status === "calling";
    var finished = ticket.status === "served" || ticket.status === "absent";
    var mainContent = finished
      ? "<div class=\"called\"><div class=\"eyebrow\">Atendimento encerrado</div><div class=\"ticket-code\">" + esc(ticket.code) + "</div><h2>Obrigado por usar a Fila Virtual</h2><p>Você pode sair desta senha com segurança.</p></div>"
      : calling
        ? "<div class=\"called\"><div class=\"eyebrow\">Chamando agora</div><div class=\"ticket-code\">" + esc(ticket.code) + "</div><h2>Vá para o balcão " + esc(ticket.counter || "") + "</h2><p>Mostre sua senha para a equipe.</p></div>"
        : (view === "position" ? renderPosition() : renderTimeline());
    app.innerHTML = [
      "<div class=\"screen\"><header class=\"status-header\"><img src=\"assets/mark-bird.svg\" alt=\"Mutum\"><div class=\"venue\"><small>Fila virtual</small><strong>", esc(config.venue.name || "Clínica Centro"), "</strong></div>",
      "<div class=\"live ", connected ? "" : "off", "\"><span class=\"live-dot\"></span>", connected ? "ao vivo" : "reconectando", "</div></header>",
      "<div class=\"status-content scroll\">",
      !calling && !finished ? "<div class=\"segments\"><button class=\"segment " + (view === "position" ? "active" : "") + "\" data-view=\"position\">Posição</button><button class=\"segment " + (view === "timeline" ? "active" : "") + "\" data-view=\"timeline\">Linha do tempo</button></div>" : "",
      mainContent,
      !calling && !finished ? "<div class=\"reminder\">" + iconBell() + "<div class=\"reminder-copy\"><strong>Continua na fila?</strong><span>Confirme sua presença para não perder a vez.</span></div><button id=\"presence\">Confirmar</button></div>" : "",
      "<div class=\"ad ", adsEnabled() ? "show" : "", "\" data-ad-slot=\"queue-status-bottom\">Espaço reservado para anúncio</div></div>",
      "<footer class=\"status-footer\">",
      !calling && !finished ? "<button class=\"btn btn-secondary\" id=\"openPass\">Passar a vez</button>" : "",
      "<button class=\"btn btn-quiet\" id=\"leave\">Sair deste aparelho</button></footer>",
      passOpen ? renderPassSheet() : "",
      "</div>"
    ].join("");
    Array.prototype.forEach.call(document.querySelectorAll("[data-view]"), function(button) {
      button.addEventListener("click", function() { view = button.dataset.view; render(); });
    });
    var presence = document.getElementById("presence");
    if (presence) presence.addEventListener("click", confirmPresence);
    var openPass = document.getElementById("openPass");
    if (openPass) openPass.addEventListener("click", function() { passOpen = true; render(); });
    document.getElementById("leave").addEventListener("click", leaveDevice);
    var closeSheet = document.getElementById("closeSheet");
    if (closeSheet) closeSheet.addEventListener("click", function() { passOpen = false; render(); });
    var passGps = document.getElementById("passGps");
    if (passGps) passGps.addEventListener("click", passWithGps);
    var passQr = document.getElementById("passQr");
    if (passQr) passQr.addEventListener("click", passWithQr);
    requestAnimationFrame(function() { if (window.FilaAds) window.FilaAds.refresh(); });
  }

  function renderPassSheet() {
    return [
      "<div class=\"sheet-backdrop\" id=\"closeSheet\"></div><aside class=\"sheet\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"passTitle\"><div class=\"sheet-handle\"></div>",
      "<h3 id=\"passTitle\">Passar a vez</h3><p>Para evitar abuso, confirme que você está perto do ponto onde entrou na fila.</p>",
      "<div class=\"sheet-actions\"><button class=\"btn btn-primary\" id=\"passGps\" ", busy ? "disabled" : "", ">Confirmar com GPS</button>",
      "<button class=\"btn btn-secondary\" id=\"passQr\" ", busy ? "disabled" : "", ">Reler QR code</button></div></aside>"
    ].join("");
  }

  function render() {
    ticket = computeTicket();
    syncNativeAds();
    if (!ticket) renderEntry();
    else if (confirmation) renderConfirmation();
    else renderStatus();
  }

  async function joinQueue(event) {
    event.preventDefault();
    var name = new FormData(event.currentTarget).get("name");
    busy = true;
    render();
    try {
      var data = await api("POST", "/api/tickets", { name: name, source: "qr", qrToken: qrToken });
      ticket = data.ticket;
      config = data.config || config;
      localStorage.setItem(TOKEN_KEY, qrToken);
      localStorage.setItem(STORAGE_KEY, String(ticket.id));
      confirmation = true;
      flash(ticket.code + " entrou na fila.");
      showNativeInterstitial("queue_joined");
    } catch (error) {
      flash(error.message);
    } finally {
      busy = false;
      render();
    }
  }

  function leaveDevice() {
    localStorage.removeItem(STORAGE_KEY);
    ticket = null;
    passOpen = false;
    confirmation = false;
    render();
  }

  function passWithGps() {
    if (!navigator.geolocation) {
      flash("GPS indisponível. Use a opção de reler o QR.");
      return;
    }
    busy = true;
    render();
    navigator.geolocation.getCurrentPosition(async function(position) {
      try {
        var data = await api("POST", "/api/tickets/" + ticket.id + "/pass", {
          latitude: position.coords.latitude,
          longitude: position.coords.longitude
        });
        ticket = data.ticket;
        passOpen = false;
        flash("Vez passada com GPS confirmado.");
      } catch (error) {
        flash(error.message);
      } finally {
        busy = false;
        render();
      }
    }, function() {
      busy = false;
      flash("Permissão negada. Tente reler o QR do balcão.");
      render();
    }, { enableHighAccuracy: true, timeout: 8000 });
  }

  async function passWithQr() {
    if (nativeApp && typeof nativeApp.scanQrCode === "function") {
      scanNativeQr("pass");
      return;
    }
    return passWithQrToken(qrToken);
  }

  async function passWithQrToken(token) {
    busy = true;
    render();
    try {
      var data = await api("POST", "/api/tickets/" + ticket.id + "/pass", { qrToken: token });
      ticket = data.ticket;
      passOpen = false;
      flash("Local confirmado pelo QR.");
    } catch (error) {
      flash(error.message);
    } finally {
      busy = false;
      render();
    }
  }

  async function confirmPresence() {
    if (busy) return;
    busy = true;
    render();
    try {
      var data = await api("POST", "/api/tickets/" + ticket.id + "/presence", { qrToken: qrToken });
      ticket = data.ticket;
      flash(data.message || "Presença confirmada. Você continua na fila.");
    } catch (error) {
      flash(error.message);
    } finally {
      busy = false;
      render();
    }
  }

  window.FilaNativeQrResult = function(token, purpose) {
    if (purpose === "pass") passWithQrToken(token);
  };

  async function loadConfig() {
    try {
      config = await api("GET", "/api/config");
    } catch (_error) {
      config.venue.qrToken = qrToken;
    }
  }

  async function restoreTicket() {
    var id = localStorage.getItem(STORAGE_KEY);
    if (!id) return;
    try {
      var data = await api("GET", "/api/tickets/" + id);
      ticket = data.ticket;
      state = data.state;
    } catch (_error) {
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  function connectWs() {
    var proto = location.protocol === "https:" ? "wss:" : "ws:";
    var url = WS_BASE
      ? (/\/ws$/.test(WS_BASE) ? WS_BASE : WS_BASE.replace(/\/$/, "") + "/ws")
      : (proto + "//" + location.host + "/ws");
    var socket = new WebSocket(url);
    socket.onopen = function() { connected = true; render(); };
    socket.onmessage = function(event) {
      try {
        var message = JSON.parse(event.data);
        if (message.type === "state") {
          state = message.data;
          if (state.monetization) config.monetization = state.monetization;
          render();
        }
      } catch (_error) {}
    };
    socket.onclose = function() {
      connected = false;
      render();
      setTimeout(connectWs, 1200);
    };
    socket.onerror = function() { socket.close(); };
  }

  Promise.resolve().then(loadConfig).then(restoreTicket).then(function() {
    render();
    connectWs();
  });
})();
</script>
</body>
</html>
